      discovery_rules:
        - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b12001
          name: 'QuRouter: WAN interface discovery'
          type: DEPENDENT
          key: qrouter.discovery.wan
          delay: '0'
          master_item: {key: qrouter.api.aggregate}
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var root = JSON.parse(value);
                  var arr = (((root.wan_status || {}).result || {}).wan || []);
                  var cfg = (((root.ports_config || {}).result || {}).wan || []);
                  var cfgByPort = {};
                  for (var c = 0; c < cfg.length; c++) cfgByPort[String(cfg[c].portName)] = cfg[c];
                  function speedClass(port) { return Number(port) >= 5 ? '10GbE' : '1GbE'; }
                  function wanLabel(port, cfgItem) {
                    var label = 'WAN ' + speedClass(port) + ' port ' + port;
                    var name = cfgItem && (cfgItem.name || cfgItem.description);
                    if (name) label += ' - ' + String(name);
                    return label;
                  }
                  var data = [];
                  for (var i = 0; i < arr.length; i++) {
                    if (!arr[i].ifname) continue;
                    var m = String(arr[i].ifname).match(/(\d+)$/);
                    var port = m ? m[1] : String(arr[i].ifname);
                    var cfgItem = cfgByPort[port] || {};
                    data.push({
                      '{#IFNAME}': String(arr[i].ifname),
                      '{#WANPORT}': port,
                      '{#WANIP}': String(arr[i].ip4Address || ''),
                      '{#WANNAME}': String(cfgItem.name || cfgItem.description || ''),
                      '{#WANLABEL}': wanLabel(port, cfgItem),
                      '{#PORTSPEED}': speedClass(port)
                    });
                  }
                  return JSON.stringify({data: data});
          item_prototypes:
            - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b12101
              name: 'QuRouter {#WANLABEL}: Link status'
