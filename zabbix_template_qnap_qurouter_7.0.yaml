zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b1a001
      name: Templates/Network devices
  templates:
    - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b1a010
      template: 'Template Net QNAP QuRouter REST API'
      name: 'Template Net QNAP QuRouter REST API'
      description: |
        QNAP QuRouter REST API template for Zabbix 7.0.
        Uses a Script master item: POST /miro/api/v1/login, then read-only GET calls with Authorization: Bearer <token>.
        Configure host macros before enabling. The export does not contain real credentials.
      groups:
        - name: Templates/Network devices
      macros:
        - macro: '{$QROUTER.URL}'
          value: 'https://10.77.71.254'
          description: 'QuRouter base URL.'
        - macro: '{$QROUTER.USER}'
          value: ''
          description: 'Local QuRouter username.'
        - macro: '{$QROUTER.PASSWORD}'
          value: ''
          type: SECRET_TEXT
          description: 'Local QuRouter password.'
        - macro: '{$QROUTER.FORCE_LOGIN}'
          value: 'true'
          description: 'Force login to obtain a token when another session exists. May close active web UI sessions.'
        - macro: '{$QROUTER.INTERVAL}'
          value: '1m'
          description: 'Master API polling interval.'
        - macro: '{$QROUTER.CLIENTS.MAX.WARN}'
          value: '100'
          description: 'Warning threshold for known clients.'
        - macro: '{$QROUTER.NODATA}'
          value: '5m'
          description: 'No-data interval for the master API item.'
        - macro: '{$QROUTER.CPU.LOAD.WARN}'
          value: '80'
          description: 'Warning threshold for average CPU load.'
        - macro: '{$QROUTER.CPU.TEMP.WARN}'
          value: '80'
          description: 'Warning threshold for average CPU temperature in Celsius.'
        - macro: '{$QROUTER.MEMORY.PUSED.WARN}'
          value: '85'
          description: 'Warning threshold for memory utilization percentage.'
        - macro: '{$QROUTER.REBOOT.UPTIME.MIN}'
          value: '600'
          description: 'Uptime below this value after a previous higher value is treated as a reboot.'
        - macro: '{$QROUTER.QUWAN.AGENT.REQUIRED}'
          value: '0'
          description: 'Set to 1 to alert when the QuWAN cloud agent is not running.'
        - macro: '{$QROUTER.WAN.LINK.REQUIRED}'
          value: '1'
          description: 'Default WAN link trigger switch. Set to 1 for multi-WAN routers where all discovered WAN interfaces should stay online. Override with context macros like {$QROUTER.WAN.LINK.REQUIRED:"wan1"}=0 if needed.'
        - macro: '{$QROUTER.PORT.LINK.REQUIRED}'
          value: '1'
          description: 'Default WAN port link trigger switch. Override with context macros like {$QROUTER.PORT.LINK.REQUIRED:"1"}=0 if needed.'
        - macro: '{$QROUTER.WAN.NCSI.OK}'
          value: '0'
          description: 'Expected NCSI status for healthy WAN interfaces. On the observed QHora-301W, 0 means healthy.'
        - macro: '{$QROUTER.WAN.RX.MIN.WARN}'
          value: '0'
          description: 'Optional minimum RX throughput in Bps per WAN port. Leave 0 to disable low-traffic alerts.'
        - macro: '{$QROUTER.WAN.TX.MIN.WARN}'
          value: '0'
          description: 'Optional minimum TX throughput in Bps per WAN port. Leave 0 to disable low-traffic alerts.'
        - macro: '{$QROUTER.ETH.LINK.REQUIRED}'
          value: '0'
          description: 'Default Ethernet physical port link trigger switch. Use context macros like {$QROUTER.ETH.LINK.REQUIRED:"2"}=1 for required LAN ports.'
        - macro: '{$QROUTER.SWITCH.ERRORS.WARN}'
          value: '0'
          description: 'Set to 1 to alert when switch port error or dropped counters increase.'
      items:
        - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b10001
          name: 'QuRouter: API aggregate JSON'
          type: SCRIPT
          key: qrouter.api.aggregate
          delay: '{$QROUTER.INTERVAL}'
          history: '0'
          trends: '0'
          value_type: TEXT
          timeout: 30s
          parameters:
            - name: url
              value: '{$QROUTER.URL}'
            - name: username
              value: '{$QROUTER.USER}'
            - name: password
              value: '{$QROUTER.PASSWORD}'
            - name: force_login
              value: '{$QROUTER.FORCE_LOGIN}'
          params: |
            var p = JSON.parse(value);
            function fail(m) { throw 'QuRouter API: ' + m; }
            function base(url) { if (!url) fail('missing URL'); return String(url).replace(/\/+$/, ''); }
            function truthy(v) { return ['1','true','yes','y','si','s'].indexOf(String(v).toLowerCase()) !== -1; }
            function utf8(s) {
              var b = [];
              for (var i = 0; i < s.length; i++) {
                var c = s.charCodeAt(i);
                if (c < 128) b.push(c);
                else if (c < 2048) { b.push(192 | (c >> 6)); b.push(128 | (c & 63)); }
                else if (c >= 55296 && c <= 56319) {
                  i++; var n = s.charCodeAt(i); var cp = 65536 + (((c & 1023) << 10) | (n & 1023));
                  b.push(240 | (cp >> 18)); b.push(128 | ((cp >> 12) & 63)); b.push(128 | ((cp >> 6) & 63)); b.push(128 | (cp & 63));
                } else { b.push(224 | (c >> 12)); b.push(128 | ((c >> 6) & 63)); b.push(128 | (c & 63)); }
              }
              return b;
            }
            function b64(s) {
              var ch = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
              var b = utf8(String(s)); var out = '';
              for (var i = 0; i < b.length; i += 3) {
                var b1 = b[i], b2 = i + 1 < b.length ? b[i + 1] : 0, b3 = i + 2 < b.length ? b[i + 2] : 0;
                out += ch[b1 >> 2] + ch[((b1 & 3) << 4) | (b2 >> 4)] + (i + 1 < b.length ? ch[((b2 & 15) << 2) | (b3 >> 6)] : '=') + (i + 2 < b.length ? ch[b3 & 63] : '=');
              }
              return out;
            }
            function json(s, ctx) { try { return JSON.parse(s); } catch (e) { fail(ctx + ' returned non-JSON'); } }
            function req(method, url, body, token) {
              var r = new HttpRequest();
              r.addHeader('Accept: application/json');
              r.addHeader('Content-Type: application/json');
              if (token) r.addHeader('Authorization: Bearer ' + token);
              var response = method === 'POST' ? r.post(url, body) : r.get(url);
              return {status: r.getStatus(), body: response};
            }
            function scrub(o) {
              var re = /(username|user_name|password|passwd|token|secret|key|psk|sid|session|authorization|credential)/i;
              if (o === null || o === undefined) return o;
              if (Object.prototype.toString.call(o) === '[object Array]') { var a = []; for (var i = 0; i < o.length; i++) a.push(scrub(o[i])); return a; }
              if (typeof o === 'object') { var c = {}, ks = Object.keys(o); for (var k = 0; k < ks.length; k++) c[ks[k]] = re.test(ks[k]) ? '<redacted>' : scrub(o[ks[k]]); return c; }
              return o;
            }
            var url = base(p.url);
            if (!p.username || !p.password) fail('missing username or password macro');
            var login = req('POST', url + '/miro/api/v1/login', JSON.stringify({username: String(p.username), password: b64(String(p.password)), force: truthy(p.force_login), remember_me: false, qid_login: false}), null);
            var lj = json(login.body, 'login');
            if (lj.error_code !== 0) fail('login failed: HTTP ' + login.status + ', error_code=' + lj.error_code + ', message=' + lj.error_message);
            var token = lj.result && lj.result.access_token;
            if (!token) fail('login returned no token; had_session=' + (lj.result && lj.result.had_session) + '; set {$QROUTER.FORCE_LOGIN}=true');
            var endpoints = {
              basic_info: '/miro/api/v1/debugmode/information',
              cloud_service: '/miro/api/v1/cloud_service',
              connection_status: '/miro/api/v1/connection_status',
              deployment_progress: '/miro/api/v1/quwan/deployment_progress',
              quwan_status: '/miro/api/v1/quwan/status',
              machine_info: '/miro/api/v2/system/machine_info',
              network_status: '/miro/api/v2/network_status',
              hardware_status: '/miro/api/v2/system/hardware_status',
              ports_config: '/miro/api/v2/network/ports',
              ports_status: '/miro/api/v2/network/ports_status',
              port_statistic: '/miro/api/v2/debugmode/port_statistic',
              wan_status: '/miro/api/v2/network/wan/status',
              clients: '/miro/api/v2/clients',
              firmware: '/miro/api/v2/firmware',
              load_balancing_status: '/miro/api/v2/load_balancing_status',
              ddns_info: '/miro/api/v2/ddns/info',
              wireless_status: '/miro/api/v2/wireless/status',
              wireless_band_status: '/miro/api/v2/wireless/band/status',
              vap_status: '/miro/api/v2/wireless/vap/status',
              eventlogs: '/miro/api/v2/eventlogs'
            };
            var out = {_meta: {success: 1, collected: 0, failed: 0, timestamp: Math.floor(Date.now() / 1000)}, login: {status: login.status, error_code: lj.error_code, had_session: !!lj.result.had_session}};
            var names = Object.keys(endpoints);
            for (var n = 0; n < names.length; n++) {
              var name = names[n];
              var r = req('GET', url + endpoints[name], null, token);
              var j = scrub(json(r.body, name));
              j._http_status = r.status;
              out[name] = j;
              if (r.status === 200 && j.error_code === 0) out._meta.collected++; else out._meta.failed++;
            }
            return JSON.stringify(out);
          tags:
            - tag: component
              value: raw
        - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b10002
          name: 'QuRouter: API endpoints failed'
          type: DEPENDENT
          key: qrouter.api.failed
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          master_item:
            key: qrouter.api.aggregate
          preprocessing:
            - type: JSONPATH
              parameters: ['$._meta.failed']
          triggers:
            - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b19010
