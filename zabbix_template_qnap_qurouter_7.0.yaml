                  var root = JSON.parse(value);
                  var arr = (((root.port_statistic || {}).result || {}).portStatistics || []);
                  var cfg = (((root.ports_config || {}).result) || {});
                  var cfgByPort = {};
                  function putCfg(items) {
                    items = items || [];
                    for (var j = 0; j < items.length; j++) if (items[j].portName) cfgByPort[String(items[j].portName)] = items[j];
