          name: 'QuRouter: Ethernet physical port discovery'
          type: DEPENDENT
          key: qrouter.discovery.eth_ports
          delay: '0'
          master_item: {key: qrouter.api.aggregate}
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var root = JSON.parse(value);
                  var cfg = (((root.ports_config || {}).result) || {});
                  var st = (((root.ports_status || {}).result) || {});
                  var ports = {};
                  function speedClass(port) { return Number(port) >= 5 ? '10GbE' : '1GbE'; }
                  function add(portName, role, item) {
                    if (!portName) return;
                    portName = String(portName);
                    if (!ports[portName]) ports[portName] = {'{#PORT}': portName, '{#PORTSPEED}': speedClass(portName)};
                    if (role && (!ports[portName]['{#ROLE}'] || role !== 'occupied')) ports[portName]['{#ROLE}'] = role;
                    if (item && item.name) ports[portName]['{#NAME}'] = String(item.name);
                    if (item && item.description) ports[portName]['{#DESCRIPTION}'] = String(item.description);
                  }
                  function each(arr, role) {
                    arr = arr || [];
                    for (var i = 0; i < arr.length; i++) add(arr[i].portName, role, arr[i]);
                  }
                  each(cfg.wan, 'wan');
                  each(cfg.lan, 'lan');
                  each(st.wan, 'wan');
                  each(st.lan, 'lan');
                  each(st.vlan, 'vlan');
                  each(st.occupied, 'occupied');
                  var data = [];
                  var keys = Object.keys(ports).sort(function(a, b) { return Number(a) - Number(b); });
                  for (var k = 0; k < keys.length; k++) {
                    var p = ports[keys[k]];
                    var label = p['{#PORTSPEED}'] + ' port ' + p['{#PORT}'];
                    if (p['{#NAME}']) label += ' - ' + p['{#NAME}'];
                    if (p['{#DESCRIPTION}'] && p['{#DESCRIPTION}'] !== p['{#NAME}']) label += ' (' + p['{#DESCRIPTION}'] + ')';
                    p['{#PORTDISPLAY}'] = label;
                    data.push(p);
                  }
                  return JSON.stringify({data: data});
