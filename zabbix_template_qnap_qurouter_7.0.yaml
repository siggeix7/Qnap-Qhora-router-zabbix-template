        - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b10207
          name: 'QuRouter: Memory utilization'
          type: DEPENDENT
          key: qrouter.system.memory.pused
          delay: '0'
          history: 30d
          trends: 365d
          value_type: FLOAT
          units: '%'
          master_item: {key: qrouter.api.aggregate}
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var root = JSON.parse(value);
                  var r = (((root.basic_info || {}).result) || {});
                  if (!r.mem_total) return null;
                  return r.mem_used / r.mem_total * 100;
          triggers:
            - uuid: 8c0c0d1b81c34c6f9d4fd1b7f7b19013
              expression: 'avg(/Template Net QNAP QuRouter REST API/qrouter.system.memory.pused,15m)>{$QROUTER.MEMORY.PUSED.WARN}'
